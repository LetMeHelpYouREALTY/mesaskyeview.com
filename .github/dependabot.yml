# Dependabot configuration — corrected per verified 2026 best practices.
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates

version: 2
updates:
  # NPM dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "automated"
    commit-message:
      prefix: "deps"
    cooldown:
      semver-patch-days: 3
      semver-minor-days: 7
      semver-major-days: 14
    groups:
      minor-and-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
        exclude-patterns:
          - "@anthropic-ai/sdk"
          - "@sentry/*"
          - "next"
          - "react"
          - "react-dom"
    ignore:
      - dependency-name: "@anthropic-ai/sdk"
        update-types: ["version-update:semver-minor"]
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "ci/cd"
      - "automated"
    commit-message:
      prefix: "ci"
