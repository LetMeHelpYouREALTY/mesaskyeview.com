name: Cloudflare Pages Deployment

# Production for mesaskyeview.com is on Vercel (www.mesaskyeview.com).
# Cloudflare: use DNS-only (gray cloud) at the zone; optional Workers for headers.
# Pages deploy runs only via workflow_dispatch to avoid failed pushes when secrets/project differ.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_pages:
        description: Deploy static build to Cloudflare Pages (optional; Vercel is production)
        type: boolean
        default: false
      deploy_workers:
        description: Deploy Cloudflare Workers (security-headers worker)
        type: boolean
        default: false

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "10"
  CF_PAGES_PROJECT: mesaskyeview-com

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    if: >-
      ${{ github.event_name == 'workflow_dispatch' &&
      github.event.inputs.deploy_pages == 'true' }}
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build for Cloudflare Pages
        run: pnpm run build:cloudflare
        env:
          NEXT_PUBLIC_SITE_URL: https://www.mesaskyeview.com
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          NEXT_PUBLIC_REALSCOUT_AGENT_ID: ${{ secrets.NEXT_PUBLIC_REALSCOUT_AGENT_ID }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .vercel/output/static --project-name=${{ env.CF_PAGES_PROJECT }} --branch=${{ github.ref_name }}

  deploy-workers:
    name: Deploy Cloudflare Workers
    runs-on: ubuntu-latest
    if: >-
      ${{ github.event_name == 'workflow_dispatch' &&
      github.event.inputs.deploy_workers == 'true' }}
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env production

  production-note:
    name: Production hosting (Vercel)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' }}
    steps:
      - name: Vercel is canonical for mesaskyeview.com
        run: |
          echo "mesaskyeview.com production: https://www.mesaskyeview.com (Vercel)"
          echo "To deploy Cloudflare Pages or Workers, re-run this workflow with deploy_pages or deploy_workers enabled."
          echo "Required GitHub secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID"
