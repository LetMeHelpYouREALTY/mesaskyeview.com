# Preview deploys disabled for mesaskyeview.com — production is https://www.mesaskyeview.com only.
# Vercel Git: main → Production (see vercel.json git.deploymentEnabled).
# Re-enable manually via workflow_dispatch if you need a one-off preview URL.

name: Vercel Preview Deployment (disabled)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type deploy-preview to run a one-off preview (not linked to www.mesaskyeview.com)"
        required: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy-preview:
    name: Deploy to Vercel Preview (manual only)
    if: github.event.inputs.confirm == 'deploy-preview'
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Preview deploys are off by default. Production: push to main only."
          echo "See docs/google-search-console.md and .cursor/rules/vercel-single-production-deploy.mdc"
